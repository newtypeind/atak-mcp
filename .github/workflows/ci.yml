name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Device-free unit suite (the `device` marker is excluded by default).
      # --cov-fail-under is a low regression floor; the real gate is patch coverage below.
      - run: uv run --extra test pytest -q --cov --cov-report=term --cov-report=xml --cov-fail-under=55
      - if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  patch-coverage:
    name: patch coverage (changed lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # diff-cover needs history to diff against the base branch
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv run --extra test pytest -q --cov --cov-report=xml
      # New / changed lines must be >= 90% covered. This is what enforces that a
      # new feature ships with tests, without forcing coverage of legacy device code.
      - run: >
          uv run --with diff-cover diff-cover coverage.xml
          --compare-branch=origin/${{ github.base_ref }}
          --src-roots src .
          --fail-under=90
